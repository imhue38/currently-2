<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'DotGothic16',sans-serif;

background:transparent;

padding:10px;

}

/* 視窗 */

.window{

width:260px;

background:#FFFDFE;

border:2px solid #D8CCD9;

overflow:hidden;

}

/* Win98標題列 */

.titlebar{

height:28px;

background:#EEE6F1;

border-bottom:1px solid #D8CCD9;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 6px;

}

/* 標題 */

.title{

font-size:11px;

color:#7A678D;

letter-spacing:1px;

}

/* 右上角按鈕 */

.controls{

display:flex;

gap:2px;

}

.control{

width:16px;

height:16px;

background:#FDFDFD;

border-top:1px solid #FFFFFF;
border-left:1px solid #FFFFFF;

border-right:1px solid #999;
border-bottom:1px solid #999;

display:flex;

align-items:center;

justify-content:center;

font-size:8px;

color:#555;

}

/* 內容 */

.content{

padding:12px;

background:#FFFCFD;

}

/* 小標籤 */

.label{

display:inline-block;

padding:2px 6px;

font-size:9px;

background:#F5EEF7;

border:1px solid #E4D9E8;

color:#8C78A0;

margin-bottom:5px;

}

/* 內容文字 */

.value{

font-size:11px;

line-height:1.8;

color:#5E5367;

}

/* 分隔線 */

.divider{

border-top:1px dashed #E6DCE8;

margin:10px 0;

}

</style>

</head>

<body>

<div class="window">

<div class="titlebar">

<div class="title">
♡ CURRENTLY ♡
</div>

<div class="controls">

<div class="control">─</div>

<div class="control">□</div>

<div class="control">✕</div>

</div>

</div>

<div class="content">

<div>

<div class="label">
最近聆聽
</div>

<div class="value">
Buono!
</div>

</div>

<div class="divider"></div>

<div>

<div class="label">
正在沉迷
</div>

<div class="value">
Rozen Maiden
</div>

</div>

<div class="divider"></div>

<div>

<div class="label">
在玩什麼
</div>

<div class="value">
Animal Crossing
</div>

</div>

<div class="divider"></div>

<div>

<div class="label">
心情
</div>

<div class="value">
(◕‿◕✿)
</div>

</div>

</div>

</div>

</body>
</html>
